<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="work">专注</button>
      <button class="mode-tab" data-mode="shortBreak">短休息</button>
      <button class="mode-tab" data-mode="longBreak">长休息</button>
    </div>

    <div class="timer-ring">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="88" />
        <circle class="ring-progress" cx="100" cy="100" r="88" id="progressCircle" />
      </svg>
      <div class="timer-display">
        <span class="time" id="timeDisplay">25:00</span>
        <span class="status" id="statusLabel">准备开始</span>
      </div>
    </div>

    <button class="btn-main" id="btnMain">
      <span id="btnLabel">开始专注</span>
    </button>

    <button class="btn-reset" id="btnReset">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M13.65 2.35A7.96 7.96 0 008 0a8 8 0 100 16 7.96 7.96 0 005.66-2.35 1 1 0 00-1.42-1.42A5.96 5.96 0 018 14a6 6 0 110-12 5.96 5.96 0 014.24 1.76L10.5 5.5h5v-5l-1.85 1.85z" fill="currentColor"/>
      </svg>
    </button>

    <div class="sessions" id="sessions">
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
